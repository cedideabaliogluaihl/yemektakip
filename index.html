<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5016">
<title>Yemek Takip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f5f4f0; --bg2: #eceae4; --bg3: #ffffff;
    --text: #1a1a1a; --text2: #5a5a5a; --text3: #9a9a9a;
    --accent: #2d5016; --accent-light: #e8f0e0; --accent-text: #2d5016;
    --red: #c0392b; --red-light: #fdecea;
    --orange: #d35400; --orange-light: #fef0e6;
    --green: #27ae60; --green-light: #e8f8ee;
    --blue: #2471a3; --blue-light: #eaf4fb;
    --border: rgba(0,0,0,0.09);
    --radius: 14px; --radius-sm: 9px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); }
  #app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  .topbar { background: var(--accent); color: #fff; padding: 12px 14px 10px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar h1 { font-size: 16px; font-weight: 700; }
  .topbar-sub { font-size: 10px; opacity: 0.7; margin-top: 1px; }
  .topbar-right { display: flex; gap: 6px; align-items: center; }
  .topbar-btn { background: rgba(255,255,255,0.18); border: none; color: #fff; padding: 6px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: #2ecc71; }
  .sync-dot.err { background: #e74c3c; }
  .sync-dot.spin { background: #f39c12; animation: blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .sync-bar { background: var(--blue-light); color: var(--blue); font-size: 12px; font-weight: 600; padding: 7px 14px; text-align: center; display: none; }
  .sync-bar.show { display: block; }

  .month-scroll { background: var(--accent); padding: 0 12px 12px; }
  .month-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .month-tabs::-webkit-scrollbar { display: none; }
  .mtab { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; flex-shrink: 0; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); border: none; font-family: inherit; transition: all 0.15s; }
  .mtab.active { background: #fff; color: var(--accent); }

  .body { flex: 1; overflow-y: auto; padding: 14px 12px 100px; }

  .fee-card { background: var(--bg3); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .fee-card-left label { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 2px; }
  .fee-val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .fee-val.empty { font-size: 14px; color: var(--orange); font-weight: 600; }
  .fee-btns { display: flex; gap: 7px; }
  .fee-edit-btn { border: none; padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .fee-edit-btn.green { background: var(--accent-light); color: var(--accent-text); }
  .fee-edit-btn.red { background: var(--red-light); color: var(--red); }

  .summary { display: flex; gap: 8px; margin-bottom: 12px; }
  .sum-box { flex: 1; background: var(--bg3); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 10px 8px; text-align: center; }
  .s-label { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .s-val { font-size: 16px; font-weight: 700; margin-top: 3px; }
  .s-val.green { color: var(--green); } .s-val.red { color: var(--red); } .s-val.gray { color: var(--text2); }

  .student-card { background: var(--bg3); border-radius: var(--radius); border: 1px solid var(--border); padding: 13px 14px; margin-bottom: 9px; cursor: pointer; transition: transform 0.1s; }
  .student-card:active { transform: scale(0.98); }
  .sc-top { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .sc-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .2s; background: var(--bg2); }
  .sc-check.done { background: var(--green); border-color: var(--green); color: #fff; }
  .sc-check.partial { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
  .sc-name-wrap { flex: 1; min-width: 0; }
  .sc-name { font-size: 15px; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sc-name.done { text-decoration: line-through; text-decoration-color: var(--green); text-decoration-thickness: 3px; color: var(--text2); }
  .sc-paid-label { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 2px; display: none; }
  .sc-paid-label.show { display: block; }
  .sc-stats { display: flex; gap: 7px; }
  .sc-stat { flex: 1; background: var(--bg); border-radius: 9px; padding: 6px 4px; text-align: center; }
  .ss-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); }
  .ss-val { font-size: 13px; font-weight: 700; margin-top: 2px; }

  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 12px; }
  .badge.paid { background: var(--green-light); color: var(--green); }
  .badge.debt { background: var(--red-light); color: var(--red); }
  .badge.partial { background: var(--orange-light); color: var(--orange); }
  .badge.neutral { background: var(--bg2); color: var(--text2); }

  .empty { text-align: center; padding: 48px 24px; color: var(--text3); font-size: 14px; line-height: 1.7; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  .fab { position: fixed; bottom: 22px; right: 18px; width: 58px; height: 58px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 30px; font-weight: 300; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; box-shadow: 0 4px 18px rgba(45,80,22,0.35); z-index: 40; transition: transform 0.1s; }
  .fab:active { transform: scale(0.93); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .sheet { background: var(--bg3); border-radius: 22px 22px 0 0; padding: 20px 18px 32px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; transform: translateY(30px); transition: transform 0.25s ease; }
  .overlay.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .sheet h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

  .fg { margin-bottom: 14px; }
  .fg label { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .fg input, .fg select { width: 100%; padding: 11px 13px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; font-family: inherit; font-weight: 500; outline: none; transition: border-color 0.15s; }
  .fg input:focus, .fg select:focus { border-color: var(--accent); }
  .debt-hint { background: var(--orange-light); color: var(--orange); border-radius: var(--radius-sm); padding: 9px 13px; margin-bottom: 14px; font-size: 13px; font-weight: 600; }
  .info-box { background: var(--blue-light); color: var(--blue); border-radius: var(--radius-sm); padding: 10px 13px; margin-bottom: 14px; font-size: 12px; line-height: 1.6; }

  .btn-row { display: flex; gap: 9px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.1s; }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-cancel { background: var(--bg2); color: var(--text2); }
  .btn-danger { background: var(--red-light); color: var(--red); }
  .btn-blue { background: var(--blue-light); color: var(--blue); }

  .pay-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .pay-row:last-child { border-bottom: none; }
  .pay-amount { font-size: 15px; font-weight: 700; color: var(--green); flex: 1; }
  .pay-date { font-size: 12px; color: var(--text3); font-weight: 500; }
  .del-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px; color: var(--red); opacity: 0.6; }
  .section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px; }
  .detail-sum { display: flex; gap: 8px; margin-bottom: 4px; }
  .ds-box { flex: 1; background: var(--bg); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .ds-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text3); }
  .ds-val { font-size: 17px; font-weight: 700; margin-top: 3px; }

  /* ── PRINT ── */
  @media print {
    @page { margin: 1.5cm; }
    body { background: #fff; }
    .topbar, .month-scroll, .fab, .overlay, .sync-bar, .fee-btns { display: none !important; }
    #app { max-width: 100%; }
    .body { padding: 0; overflow: visible; }
    .student-card { break-inside: avoid; border: 1px solid #ccc !important; margin-bottom: 6px; border-radius: 4px; }
    .fee-card { border: 1px solid #ccc !important; border-radius: 4px; }
    .summary { break-inside: avoid; }
    .sum-box { border: 1px solid #ccc !important; }
    .sc-stat, .sc-stats { background: #f5f5f5 !important; }
    #printHeader { display: block !important; }
  }
  #printHeader { display: none; padding-bottom: 14px; border-bottom: 2px solid #2d5016; margin-bottom: 16px; }
  #printHeader h2 { font-size: 18px; color: #2d5016; font-weight: 700; }
  #printHeader p { font-size: 12px; color: #666; margin-top: 4px; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div>
      <div class="topbar-sub">Yemek Ödeme Sistemi</div>
      <h1 id="topTitle">Yemek Takip</h1>
    </div>
    <div class="topbar-right">
      <div class="sync-dot" id="syncDot" title="GitHub sync"></div>
      <button class="topbar-btn" onclick="openSettings()">⚙ GitHub</button>
      <button class="topbar-btn" onclick="openStudentModal()">+ Öğrenci</button>
    </div>
  </div>
  <div class="sync-bar" id="syncBar"></div>
  <div class="month-scroll"><div class="month-tabs" id="monthTabs"></div></div>
  <div class="body">
    <div id="printHeader"><h2 id="pH1"></h2><p id="pH2"></p></div>
    <div id="feeBanner"></div>
    <div class="summary" id="summary"></div>
    <div id="list"></div>
  </div>
</div>
<button class="fab" onclick="openPaymentModal()">+</button>
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet"><div class="sheet-handle"></div><div id="sheetContent"></div></div>
</div>

<script>
const MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

function loadState(){try{return JSON.parse(localStorage.getItem('yt_v4')||'null')}catch(e){return null}}
let state=loadState()||{students:[],payments:{},fees:{}};
let cfg=JSON.parse(localStorage.getItem('yt_cfg')||'null')||{token:'',gistId:''};
let month=new Date().getMonth();
let syncTimer=null;

function saveLocal(){localStorage.setItem('yt_v4',JSON.stringify(state))}
function saveCfg(){localStorage.setItem('yt_cfg',JSON.stringify(cfg))}

// ── GITHUB SYNC ──
function dot(s){const d=document.getElementById('syncDot');d.className='sync-dot'+(s?' '+s:'')}
function bar(msg,show){const b=document.getElementById('syncBar');b.textContent=msg;b.className='sync-bar'+(show?' show':'')}

async function pushToGist(){
  if(!cfg.token||!cfg.gistId)return;
  dot('spin');bar('GitHub\'a kaydediliyor...',true);
  try{
    const r=await fetch('https://api.github.com/gists/'+cfg.gistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+cfg.token,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'yemek_data.json':{content:JSON.stringify(state,null,2)}}})
    });
    if(!r.ok)throw new Error('HTTP '+r.status);
    dot('ok');bar('✓ GitHub\'a kaydedildi',true);
    setTimeout(()=>bar('',false),2500);
  }catch(e){dot('err');bar('✗ Hata: '+e.message,true);setTimeout(()=>bar('',false),4000)}
}

async function pullFromGist(){
  if(!cfg.token||!cfg.gistId)return;
  dot('spin');bar('GitHub\'dan yükleniyor...',true);
  try{
    const r=await fetch('https://api.github.com/gists/'+cfg.gistId,{headers:{'Authorization':'token '+cfg.token}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    const content=data.files['yemek_data.json']?.content;
    if(content){
      const parsed=JSON.parse(content);
      if(parsed&&parsed.students){state=parsed;saveLocal();render();dot('ok');bar('✓ GitHub\'dan yüklendi',true);setTimeout(()=>bar('',false),2500);return}
    }
    dot('ok');bar('GitHub boş — yerel veri kullanılıyor',true);setTimeout(()=>bar('',false),2500);
  }catch(e){dot('err');bar('✗ Yükleme hatası: '+e.message,true);setTimeout(()=>bar('',false),4000)}
}

function save(){
  saveLocal();
  if(cfg.token&&cfg.gistId){clearTimeout(syncTimer);syncTimer=setTimeout(pushToGist,1500)}
}

// ── HELPERS ──
function fee(m){return state.fees[m]||0}
function studentData(sid){
  const key=sid+'_'+month;
  const pays=state.payments[key]||[];
  const paid=pays.reduce((s,p)=>s+p.amount,0);
  const f=fee(month);
  return{paid,debt:f>0?f-paid:0,pays,fee:f}
}
function sortedStudents(){return[...state.students].sort((a,b)=>a.name.localeCompare(b.name,'tr',{sensitivity:'base'}))}

// ── RENDER ──
function render(){
  document.getElementById('topTitle').textContent='Yemek Takip — '+MONTHS[month];
  renderTabs();renderBanner();renderSummary();renderList();
}
function renderTabs(){
  document.getElementById('monthTabs').innerHTML=MONTHS.map((m,i)=>
    `<button class="mtab${i===month?' active':''}" onclick="setMonth(${i})">${m}</button>`).join('');
  setTimeout(()=>{const a=document.getElementById('monthTabs').querySelector('.active');if(a)a.scrollIntoView({inline:'center',behavior:'smooth'})},50)
}
function setMonth(i){month=i;render()}

function renderBanner(){
  const f=fee(month);
  document.getElementById('feeBanner').innerHTML=`
    <div class="fee-card">
      <div class="fee-card-left">
        <label>${MONTHS[month]} Aylık Ücret</label>
        ${f?`<div class="fee-val">₺${f.toLocaleString('tr-TR')}</div>`:`<div class="fee-val empty">⚠ Ücret girilmedi</div>`}
      </div>
      <div class="fee-btns">
        <button class="fee-edit-btn red" onclick="printMonth()">🖨 PDF</button>
        <button class="fee-edit-btn green" onclick="openFeeModal()">${f?'Düzenle':'Gir'}</button>
      </div>
    </div>`
}

function renderSummary(){
  let paid=0,debt=0;
  state.students.forEach(s=>{const d=studentData(s.id);paid+=d.paid;debt+=Math.max(0,d.debt)});
  document.getElementById('summary').innerHTML=`
    <div class="sum-box"><div class="s-label">Öğrenci</div><div class="s-val gray">${state.students.length}</div></div>
    <div class="sum-box"><div class="s-label">Toplam Ödenen</div><div class="s-val green">₺${paid.toLocaleString('tr-TR')}</div></div>
    <div class="sum-box"><div class="s-label">Toplam Borç</div><div class="s-val red">₺${debt.toLocaleString('tr-TR')}</div></div>`
}

function renderList(){
  const el=document.getElementById('list');
  if(!state.students.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🎒</div>Henüz öğrenci eklenmedi.<br>Sağ üstten öğrenci ekleyebilirsiniz.</div>`;return}
  const f=fee(month);
  el.innerHTML=sortedStudents().map((s,i)=>{
    const d=studentData(s.id);
    let badge,kalan;
    if(!f){badge=`<span class="badge neutral">Ücret yok</span>`;kalan='color:var(--text2)'}
    else if(d.debt<=0){badge=`<span class="badge paid">✓ Ödendi</span>`;kalan='color:var(--green)'}
    else if(d.paid>0){badge=`<span class="badge partial">Eksik</span>`;kalan='color:var(--orange)'}
    else{badge=`<span class="badge debt">Borçlu</span>`;kalan='color:var(--red)'}
    const checkClass = !f ? '' : d.debt<=0 ? 'done' : d.paid>0 ? 'partial' : '';
    const checkIcon = !f ? '' : d.debt<=0 ? '✓' : d.paid>0 ? '~' : '';
    const nameClass = (!f||d.debt>0) ? '' : 'done';
    const paidLabel = d.paid>0 ? `<div class="sc-paid-label show">₺${d.paid.toLocaleString('tr-TR')} ödendi</div>` : '<div class="sc-paid-label"></div>';
    return`<div class="student-card" onclick="openDetail('${s.id}')">
      <div class="sc-top">
        <div class="sc-check ${checkClass}">${checkIcon}</div>
        <div class="sc-name-wrap">
          <span class="sc-name ${nameClass}">${s.name}</span>
          ${paidLabel}
        </div>
      </div>
      <div class="sc-stats">
        <div class="sc-stat"><div class="ss-label">Aylık</div><div class="ss-val" style="color:var(--text2)">₺${f||'?'}</div></div>
        <div class="sc-stat"><div class="ss-label">Ödenen</div><div class="ss-val" style="color:var(--green)">₺${d.paid}</div></div>
        <div class="sc-stat"><div class="ss-label">Kalan</div><div class="ss-val" style="${kalan}">₺${Math.max(0,d.debt)}</div></div>
      </div>
    </div>`}).join('')
}

// ── MODAL ──
function openModal(html){document.getElementById('sheetContent').innerHTML=html;document.getElementById('overlay').classList.add('open')}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function overlayClick(e){if(e.target.id==='overlay')closeModal()}

// ── SETTINGS ──
function openSettings(){
  openModal(`
    <h2>⚙ GitHub Gist Ayarları</h2>
    <div class="info-box">
      <b>Verileriniz GitHub'da güvenle saklanır.</b><br><br>
      1. github.com → Settings → Developer settings → Personal access tokens → <i>gist</i> yetkisiyle token oluştur<br>
      2. gist.github.com → Yeni gist aç → <code>yemek_data.json</code> adıyla → URL'den ID'yi al
    </div>
    <div class="fg"><label>GitHub Personal Access Token</label><input id="c_tok" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cfg.token}"></div>
    <div class="fg"><label>Gist ID</label><input id="c_gid" placeholder="abc123def456..." value="${cfg.gistId}"></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveCfgAndSync()">Bağlan</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-blue" onclick="closeModal();pullFromGist()">📥 GitHub'dan Yükle</button>
      <button class="btn btn-blue" onclick="closeModal();pushToGist()">📤 GitHub'a Gönder</button>
    </div>`)
}
async function saveCfgAndSync(){
  const token=document.getElementById('c_tok').value.trim();
  const gistId=document.getElementById('c_gid').value.trim();
  if(!token||!gistId){alert('Token ve Gist ID zorunludur.');return}
  cfg={token,gistId};saveCfg();closeModal();await pushToGist()
}

// ── FEE ──
function openFeeModal(){
  const f=fee(month);
  openModal(`
    <h2>${MONTHS[month]} — Aylık Yemek Ücreti</h2>
    <div class="fg"><label>Bu Ayki Yemek Ücreti (₺)</label>
    <input id="f_fee" type="number" inputmode="numeric" placeholder="Örn: 600" value="${f||''}" autofocus></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveFee()">Kaydet</button>
    </div>`)
}
function saveFee(){
  const v=parseInt(document.getElementById('f_fee').value);
  if(!v||v<=0){alert('Geçerli bir tutar girin.');return}
  state.fees[month]=v;save();closeModal();render()
}

// ── STUDENT ──
function openStudentModal(){
  openModal(`
    <h2>Öğrenci Ekle</h2>
    <div class="fg"><label>Adı Soyadı</label><input id="s_name" placeholder="Ad Soyad" autofocus></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="addStudent()">Ekle</button>
    </div>`)
}
function addStudent(){
  const name=document.getElementById('s_name').value.trim();
  if(!name){alert('İsim zorunludur.');return}
  state.students.push({id:'s'+Date.now(),name});
  save();closeModal();render()
}

// ── PAYMENT ──
function openPaymentModal(sid){
  if(!state.students.length){alert('Önce öğrenci ekleyin.');return}
  const f=fee(month);
  if(!f){if(confirm(MONTHS[month]+' ayı ücreti girilmemiş. Girmek ister misiniz?'))openFeeModal();return}
  const opts=sortedStudents().map(s=>`<option value="${s.id}"${s.id===sid?' selected':''}>${s.name}</option>`).join('');
  openModal(`
    <h2>${MONTHS[month]} — Ödeme Ekle</h2>
    <div class="fg"><label>Öğrenci</label><select id="p_sid" onchange="updateHint()">${opts}</select></div>
    <div class="debt-hint" id="debtHint">...</div>
    <div class="fg"><label>Ödenen Tutar (₺)</label><input id="p_amt" type="number" inputmode="numeric" placeholder="Tutar girin"></div>
    <div class="fg"><label>Tarih</label><input id="p_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="addPayment()">Kaydet</button>
    </div>`);
  setTimeout(updateHint,60)
}
function updateHint(){
  const el=document.getElementById('p_sid');const hint=document.getElementById('debtHint');
  if(!el||!hint)return;
  const d=studentData(el.value);const s=state.students.find(x=>x.id===el.value);
  hint.textContent=`${s?s.name:''} — Kalan borç: ₺${Math.max(0,d.debt).toLocaleString('tr-TR')}`
}
function addPayment(){
  const sid=document.getElementById('p_sid').value;
  const amt=parseInt(document.getElementById('p_amt').value);
  const date=document.getElementById('p_date').value;
  if(!amt||amt<=0){alert('Geçerli bir tutar girin.');return}
  const key=sid+'_'+month;
  if(!state.payments[key])state.payments[key]=[];
  state.payments[key].push({amount:amt,date,id:'p'+Date.now()});
  save();closeModal();render()
}

// ── DETAIL ──
function openDetail(sid){
  const s=state.students.find(x=>x.id===sid);
  const d=studentData(sid);const f=fee(month);
  const rows=d.pays.length
    ?d.pays.map(p=>`<div class="pay-row"><div class="pay-amount">₺${p.amount.toLocaleString('tr-TR')}</div><div class="pay-date">${p.date||''}</div><button class="del-btn" onclick="delPayment('${sid}','${p.id}')">🗑</button></div>`).join('')
    :'<div style="padding:10px 0;color:var(--text3);font-size:13px">Bu ay ödeme kaydı yok</div>';
  let badge;
  if(!f)badge=`<span class="badge neutral">Ücret girilmedi</span>`;
  else if(d.debt<=0)badge=`<span class="badge paid">✓ Bu ay ödendi</span>`;
  else if(d.paid>0)badge=`<span class="badge partial">Eksik ödeme</span>`;
  else badge=`<span class="badge debt">Henüz ödeme yapılmadı</span>`;
  openModal(`
    <h2>${s.name}</h2>${badge}
    <div class="detail-sum" style="margin-top:12px">
      <div class="ds-box"><div class="ds-label">Aylık Ücret</div><div class="ds-val" style="color:var(--text2)">₺${f||'?'}</div></div>
      <div class="ds-box"><div class="ds-label">Ödenen</div><div class="ds-val" style="color:var(--green)">₺${d.paid}</div></div>
      <div class="ds-box"><div class="ds-label">Kalan Borç</div><div class="ds-val" style="color:var(--red)">₺${Math.max(0,d.debt)}</div></div>
    </div>
    <div class="section-title">Ödeme Geçmişi — ${MONTHS[month]}</div>
    ${rows}
    <div class="btn-row">
      <button class="btn btn-danger" onclick="delStudent('${sid}')">Öğrenciyi Sil</button>
      <button class="btn btn-primary" onclick="closeModal();openPaymentModal('${sid}')">+ Ödeme Ekle</button>
    </div>`)
}
function delPayment(sid,pid){
  if(!confirm('Bu ödeme silinsin mi?'))return;
  const key=sid+'_'+month;
  state.payments[key]=(state.payments[key]||[]).filter(p=>p.id!==pid);
  save();closeModal();render()
}
function delStudent(sid){
  if(!confirm('Öğrenci ve tüm ödemeleri silinsin mi?'))return;
  state.students=state.students.filter(s=>s.id!==sid);
  Object.keys(state.payments).forEach(k=>{if(k.startsWith(sid+'_'))delete state.payments[k]});
  save();closeModal();render()
}

// ── PDF / PRINT ──
function printMonth(){
  const f=fee(month);
  let paid=0,debt=0;
  state.students.forEach(s=>{const d=studentData(s.id);paid+=d.paid;debt+=Math.max(0,d.debt)});
  document.getElementById('pH1').textContent=MONTHS[month]+' — Yemek Ödeme Raporu';
  document.getElementById('pH2').textContent=
    'Aylık ücret: ₺'+(f||'?')+
    ' | Toplam ödenen: ₺'+paid.toLocaleString('tr-TR')+
    ' | Toplam borç: ₺'+debt.toLocaleString('tr-TR')+
    ' | Tarih: '+new Date().toLocaleDateString('tr-TR');
  closeModal();
  setTimeout(()=>window.print(),200)
}

// ── INIT ──
render();
if(cfg.token&&cfg.gistId){pullFromGist()}else{dot('')}
</script>
</body>
</html>
